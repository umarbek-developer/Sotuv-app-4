<!DOCTYPE html>

<html class="dark" lang="uz">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>POS Tizimi Boshqaruv Paneli</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "emerald-accent": "#10b981",
                        "background-dark": "#0a0f18",
                        "card-dark": "#161e2c",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col justify-between overflow-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -right-24 size-64 bg-primary/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 -left-24 size-80 bg-emerald-500/5 rounded-full blur-3xl"></div>
    </div>
    <main class="relative z-10 flex-1 flex flex-col items-center px-8 pt-20">
        <div class="mb-12 flex flex-col items-center">
            <div
                class="size-20 bg-gradient-to-br from-primary to-blue-600 rounded-3xl shadow-xl shadow-primary/20 flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-white text-5xl"
                    style="font-variation-settings: 'FILL' 1">point_of_sale</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Tizimga kirish</h1>
            <p class="text-slate-400 mt-2 text-sm">Davom etish uchun ma'lumotlarni kiriting</p>
            <p style="color: red;">{{msg}}</p>
        </div>
        <form method="post">
        {% csrf_token %}
        <div class="w-full max-w-sm space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1"
                    for="username">Foydalanuvchi nomi</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-xl">person</span>
                    </div>
                    <input
                        class="w-full bg-card-dark border-slate-700/50 text-white pl-11 pr-4 py-4 rounded-2xl focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600"
                        id="username" placeholder="Masalan: admin_01" type="text" name="username" />
                </div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest"
                        for="password">Parol</label>
                    <a class="text-xs font-bold text-primary hover:text-blue-400 transition-colors" href="#">Parolni
                        unutdingizmi?</a>
                </div>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-xl">lock</span>
                    </div>
                    <input
                        class="w-full bg-card-dark border-slate-700/50 text-white pl-11 pr-12 py-4 rounded-2xl focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600"
                        id="password" placeholder="••••••••" type="password" name="password" />
                    <button
                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-slate-300"
                        type="button">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit"
                    class="w-full bg-emerald-accent hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Kirish
                    <span class="material-symbols-outlined">login</span>
                </button>
            </div>
        </div>
        </form>
    </main>
    <footer class="relative z-10 px-8 pb-12 flex flex-col items-center gap-6">
        <div class="flex items-center gap-4 w-full">
            <div class="h-px flex-1 bg-slate-800"></div>
            <span class="text-xs text-slate-500 font-medium">Yoki tezkor kirish</span>
            <div class="h-px flex-1 bg-slate-800"></div>
        </div>
        <div class="flex gap-4">
            <button
                class="size-16 rounded-2xl bg-card-dark border border-slate-700/50 flex items-center justify-center text-slate-300 hover:text-primary active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl">face</span>
            </button>
            <button
                class="size-16 rounded-2xl bg-card-dark border border-slate-700/50 flex items-center justify-center text-slate-300 hover:text-primary active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl">fingerprint</span>
            </button>
        </div>
        <p class="text-xs text-slate-600">
            Versiaya 2.4.0 • Xavfsiz ulanish
        </p>
    </footer>
    <div class="flex justify-center pb-2">
        <div class="w-32 h-1.5 bg-slate-800 rounded-full"></div>
    </div>

</body>


</html>
